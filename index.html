<!DOCTYPE html>

<head>

<title>Private Gallery</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- OG -->
<meta property="og:title" content="✨ Live Session, Latest Gallery Update">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

#loading {
  position:fixed;
  width:100%;
  height:100%;
  background:#0f0f0f;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.loader {
  width:45px;
  height:45px;
  border:5px solid #333;
  border-top:5px solid #00ffcc;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% {transform:rotate(360deg);}
}

#enterScreen {
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

button {
  margin-top:20px;
  padding:12px 20px;
  background:#00ffcc;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

#galleryPage {
  display:none;
  text-align:center;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:10px;
}

.gallery img {
  width:100%;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.gallery img:hover {
  transform:scale(1.05);
}

.note {
  font-size:13px;
  opacity:0.7;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="loading">

  <p style="opacity:0.6;">Loading content...</p>
